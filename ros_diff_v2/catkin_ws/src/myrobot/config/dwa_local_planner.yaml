DWAPlannerROS:
  holonomic_robot: false

  max_vel_x: 0.18
  min_vel_x: 0.0
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.18
  min_vel_trans: 0.01
  max_vel_theta: 0.50
  min_vel_theta: 0.05

  acc_lim_x: 0.25
  acc_lim_y: 0.0
  acc_lim_theta: 0.8

  yaw_goal_tolerance: 0.20
  xy_goal_tolerance: 0.10
  latch_xy_goal_tolerance: true

  sim_time: 1.7
  sim_granularity: 0.025
  angular_sim_granularity: 0.025
  vx_samples: 12
  vy_samples: 1
  vth_samples: 28

  path_distance_bias: 24.0
  goal_distance_bias: 18.0
  occdist_scale: 0.04
  forward_point_distance: 0.07
  stop_time_buffer: 0.3
  scaling_speed: 0.20
  max_scaling_factor: 0.20

  oscillation_reset_dist: 0.03
  prune_plan: true
  trans_stopped_vel: 0.02
  rot_stopped_vel: 0.05
  publish_traj_pc: false
  publish_cost_grid_pc: false
